name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 22
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Decode keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_FILE: keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Upload release APK
      uses: actions/upload-artifact@v4
      with:
        name: release
        path: app/build/outputs/apk/release/app-release.apk
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
        generate_release_notes: false
        body: |
          ## 🎧 MotoBuds for Hyper ${{ github.ref_name }}
          
          ### 📦 下载
          - **debug.apk** — 调试版本（可直接安装）
          - **release.apk** — 签名发布版本（推荐）
          
          ### 📋 安装方法
          1. 下载 APK（推荐 Release 版本）
          2. 在 LSPosed 中启用模块
          3. 勾选作用域：com.android.bluetooth、com.milink.service、com.xiaomi.bluetooth
          4. 重启作用域或手机
          5. 连接 Moto Buds 耳机
          
          ### ✨ v1.3.0 更新内容
          
          **Bug 修复：**
          - 修复 14 处 CoroutineScope 泄漏
          - 修复 35 处 !! 强制解包操作符
          - 修复 Authority 不匹配
          - 修复 MediaControl 内存泄漏
          - 修复 ConfigManager 代码重复
          - 移除死代码
          
          **文档：**
          - 添加 KDoc 文档到核心类
          - 更新 README 截图
