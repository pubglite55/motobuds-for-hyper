name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Decode keystore
      if: ${{ env.KEYSTORE_BASE64 != '' }}
      run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Build Release APK
      if: ${{ env.KEYSTORE_BASE64 != '' }}
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_FILE: keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Upload release APK
      if: ${{ env.KEYSTORE_BASE64 != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
        generate_release_notes: false
        body: |
          ## 🎧 MotoBuds for Hyper ${{ github.ref_name }}
          
          ### 📦 下载
          - **debug.apk** — 调试版本（可直接安装）
          - **release.apk** — 签名发布版本（推荐）
          
          ### 📋 安装方法
          1. 下载 APK（推荐 Release 版本）
          2. 在 LSPosed 中启用模块
          3. 勾选作用域：com.android.bluetooth、com.milink.service、com.xiaomi.bluetooth
          4. 重启作用域或手机
          5. 连接 Moto Buds 耳机
          
          ### ✨ 更新内容
          
          **新功能：**
          - 添加模糊底栏开关
          - 添加液态玻璃开关
          
          **Bug 修复：**
          - 修复 CoroutineScope 泄漏
          - 修复 !! 强制解包操作符
          - 修复 Authority 不匹配
          - 修复 MediaControl 内存泄漏
          - 移除死代码
          
          **文档：**
          - 添加 KDoc 文档到核心类
          - 更新 README 截图
